<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
<button class="bg-toggle" id="bgToggle">🌙</button>

    <div class="page">

        <!-- Боковая панель (1/4 ширины) -->
        <nav class="sidebar">
            <h2>CargoPay</h2>
            <button class="nav-btn active" onclick="showSection('drivers')">Водители</button>
            <button class="nav-btn" onclick="showSection('trips')">Рейсы</button>
            <button class="nav-btn" onclick="showSection('calc')">Расчет</button>
            <a href="/login" class="logout-btn">Выйти</a>
        </nav>

        <!-- Основной контент (3/4 ширины) -->
        <main class="content">

            <!-- Секция: Водители -->
            <section id="drivers" class="section active">
                <h1>Водители</h1>
                <form class="data-form">
                    <div class="form-grid">
                        <div class="input-box">
                            <label>ФИО</label>
                            <input type="text" placeholder="Иванов Иван Иванович">
                        </div>
                        <div class="input-box">
                            <label>ID водителя</label>
                            <input type="text" placeholder="WD-001">
                        </div>
                        <div class="input-box">
                            <label>Номер прав</label>
                            <input type="text" placeholder="77 01 123456">
                        </div>
                        <div class="input-box">
                            <label>Категория</label>
                            <input type="text" placeholder="B, C, D">
                        </div>
                        <div class="input-box">
                            <label>Телефон</label>
                            <input type="tel" placeholder="+7 (999) 123-45-67">
                        </div>
                        <div class="input-box">
                            <label>Стаж (лет)</label>
                            <input type="number" placeholder="10">
                        </div>
                    </div>
                    <button type="submit" class="btn">Сохранить</button>
                </form>
            </section>

            <!-- Секция: Рейсы -->
            <section id="trips" class="section">
                <h1>Рейсы</h1>
                <form class="data-form">
                    <div class="form-grid">
                        <div class="input-box">
                            <label>Номер рейса</label>
                            <input type="text" placeholder="RT-1001">
                        </div>
                        <div class="input-box">
                            <label>Водитель</label>
                            <input type="text" placeholder="ФИО водителя">
                        </div>
                        <div class="input-box">
                            <label>Маршрут</label>
                            <input type="text" placeholder="Москва → Казань">
                        </div>
                        <div class="input-box">
                            <label>Груз</label>
                            <input type="text" placeholder="Описание груза">
                        </div>
                        <div class="input-box">
                            <label>Дата отправки</label>
                            <input type="date">
                        </div>
                        <div class="input-box">
                            <label>Дата прибытия</label>
                            <input type="date">
                        </div>
                        <div class="input-box">
                            <label>Расстояние (км)</label>
                            <input type="number" placeholder="820">
                        </div>
                        <div class="input-box">
                            <label>Статус</label>
                            <input type="text" placeholder="В пути / Завершён">
                        </div>
                    </div>
                    <button type="submit" class="btn">Сохранить</button>
                </form>
            </section>

            <!-- Секция: Расчет -->
            <section id="calc" class="section">
                <h1>Расчет</h1>
                <form class="data-form">
                    <div class="form-grid">
                        <div class="input-box">
                            <label>Номер рейса</label>
                            <input type="text" placeholder="RT-1001">
                        </div>
                        <div class="input-box">
                            <label>Водитель</label>
                            <input type="text" placeholder="ФИО">
                        </div>
                        <div class="input-box">
                            <label>Ставка за км (₽)</label>
                            <input type="number" placeholder="15">
                        </div>
                        <div class="input-box">
                            <label>Расстояние (км)</label>
                            <input type="number" placeholder="820">
                        </div>
                        <div class="input-box">
                            <label>Топливо (₽)</label>
                            <input type="number" placeholder="12000">
                        </div>
                        <div class="input-box">
                            <label>Доп. расходы (₽)</label>
                            <input type="number" placeholder="3000">
                        </div>
                        <div class="input-box">
                            <label>Премия (₽)</label>
                            <input type="number" placeholder="5000">
                        </div>
                        <div class="input-box">
                            <label>Итого к оплате (₽)</label>
                            <input type="text" placeholder="Автоматический расчет">
                        </div>
                    </div>
                    <button type="submit" class="btn">Рассчитать</button>
                </form>
            </section>

        </main>
    </div>
<script>

  function showSection(sectionId, btnElement) {
    // Скрываем все секции
    document.querySelectorAll('.section').forEach(section => {
      section.classList.remove('active');
    });


    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.classList.remove('active');
    });


    const targetSection = document.getElementById(sectionId);
    if (targetSection) {
      targetSection.classList.add('active');
    }


    if (btnElement) {
      btnElement.classList.add('active');
    }
  }


  document.addEventListener('DOMContentLoaded', () => {
    // Навешиваем обработчики на кнопки навигации
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        // Извлекаем ID секции из onclick атрибута
        const onclickAttr = this.getAttribute('onclick');
        if (onclickAttr) {
          const sectionId = onclickAttr.match(/'(\w+)'/)[1];
          showSection(sectionId, this);
        }
      });
    });


    const themeBtn = document.getElementById('bgToggle');

    // Проверяем сохранённую тему
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      themeBtn.textContent = '☀️';
    }

    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeBtn.textContent = isDark ? '☀️' : '🌙';
    });


    const firstSection = document.querySelector('.section');
    if (firstSection) {
      firstSection.classList.add('active');
    }


    const firstBtn = document.querySelector('.nav-btn');
    if (firstBtn) {
      firstBtn.classList.add('active');
    }
  });
</script>
</body>
</html>
