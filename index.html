<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargoPay Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        /*БАЗОВЫЕ СТИЛИ*/
        :root {
            --bs-body-bg: #212529;
            --bs-body-color: #dee2e6;
            --sidebar-width: 280px;
            --primary-color: #FF4500; /* стиль кнопок*/
            --hover-bg: rgba(255, 255, 255, 0.075);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }

        body {
            background-color: var(--bs-body-bg);
            color: var(--bs-body-color);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /*SIDEBAR (БОКОВАЯ ПАНЕЛЬ)*/
        .sidebar {
            width: var(--sidebar-width);
            background-color: #212529;
            border-right: 1px solid #343a40;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 2rem;
            padding-left: 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #adb5bd;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            font-size: 1rem;
        }

        .nav-link:hover {
            background-color: var(--hover-bg);
            color: #fff;
        }

        .nav-link.active {
            background-color: var(--primary-color);
            color: #fff;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
        }

        .nav-link i { font-size: 1.2rem; }

        .logout-btn {
            margin-top: auto;
            color: #dc3545; /* Bootstrap Danger Red */
        }

        .logout-btn:hover {
            background-color: rgba(220, 53, 69, 0.1);
            color: #ff6b7a;
        }

        /*MAIN CONTENT*/
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 2rem;
            width: calc(100% - var(--sidebar-width));
        }

        .page-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid #343a40;
            padding-bottom: 1rem;
        }

        .page-header h1 { font-size: 2rem; font-weight: 500; color: #fff; }

        /*FORMS*/
        .card {
            background-color: #2c3034;
            border: 1px solid #343a40;
            border-radius: 0.5rem;
            padding: 1.5rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #ced4da;
        }

        .form-control {
            display: block;
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #dee2e6;
            background-color: #212529;
            border: 1px solid #495057;
            border-radius: 0.375rem;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        .form-control:focus {
            color: #fff;
            background-color: #212529;
            border-color: #86b7fe;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .btn-primary {
            display: inline-block;
            font-weight: 400;
            line-height: 1.5;
            color: #fff;
            text-align: center;
            text-decoration: none;
            vertical-align: middle;
            cursor: pointer;
            user-select: none;
            background-color: var(--primary-color);
            border: 1px solid transparent;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            border-radius: 0.375rem;
            transition: all 0.15s ease-in-out;
            width: 100%;
            margin-top: 1.5rem;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
        }

        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /*АДАПТИВНОСТЬ*/
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; padding: 10px; border-right: none; border-bottom: 1px solid #343a40; }
            .brand { width: 100%; margin-bottom: 10px; justify-content: center; }
            .nav-link { width: calc(50% - 5px); justify-content: center; font-size: 0.9rem; }
            .logout-btn { width: 100%; margin-top: 10px; justify-content: center; }
            .main-content { margin-left: 0; width: 100%; padding: 1rem; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>


    <!-- Боковая панель -->
    <nav class="sidebar">
        <div class="brand">
            <i class="bi bi-truck-front-fill"></i> CargoPay
        </div>
        <a href="#" class="nav-link active" onclick="showSection('drivers', this)">
            <i class="bi bi-person-badge"></i> Водители
        </a>
        <a href="#" class="nav-link" onclick="showSection('trips', this)">
            <i class="bi bi-map"></i> Рейсы
        </a>
        <a href="#" class="nav-link" onclick="showSection('calc', this)">
            <i class="bi bi-calculator"></i> Расчет
        </a>
        <a href="../register.html" class="nav-link logout-btn">
            <i class="bi bi-box-arrow-right"></i> Выйти
        </a>
    </nav>


    <!-- Основной контент -->
    <main class="main-content">

        <!-- Секция: Водители -->
        <section id="drivers" class="section active">
            <div class="page-header">
                <h1>Управление водителями</h1>
            </div>
            <div class="card">
                <form>
                    <div class="form-grid">
                        <div><label class="form-label">ФИО</label><input type="text" class="form-control" placeholder="Иванов И.И."></div>
                        <div><label class="form-label">ID водителя</label><input type="text" class="form-control" placeholder="WD-001"></div>
                        <div><label class="form-label">Номер прав</label><input type="text" class="form-control" placeholder="77 01 123456"></div>
                        <div><label class="form-label">Категория</label><input type="text" class="form-control" placeholder="B, C, D"></div>
                        <div><label class="form-label">Телефон</label><input type="tel" class="form-control" placeholder="+7 (999) ..."></div>
                        <div><label class="form-label">Стаж (лет)</label><input type="number" class="form-control" placeholder="10"></div>
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить водителя</button>
                </form>
            </div>
        </section>

        <!-- Секция: Рейсы -->
        <section id="trips" class="section">
            <div class="page-header">
                <h1>Управление рейсами</h1>
            </div>
            <div class="card">
                <form>
                    <div class="form-grid">
                        <div><label class="form-label">Номер рейса</label><input type="text" class="form-control" placeholder="RT-1001"></div>
                        <div><label class="form-label">Водитель</label><input type="text" class="form-control" placeholder="ФИО"></div>
                        <div><label class="form-label">Маршрут</label><input type="text" class="form-control" placeholder="Москва → Казань"></div>
                        <div><label class="form-label">Груз</label><input type="text" class="form-control" placeholder="Описание"></div>
                        <div><label class="form-label">Дата отправки</label><input type="date" class="form-control"></div>
                        <div><label class="form-label">Дата прибытия</label><input type="date" class="form-control"></div>
                        <div><label class="form-label">Расстояние (км)</label><input type="number" class="form-control" placeholder="820"></div>
                        <div><label class="form-label">Статус</label><input type="text" class="form-control" placeholder="В пути"></div>
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить рейс</button>
                </form>
            </div>
        </section>

        <!-- Секция: Расчет -->
        <section id="calc" class="section">
            <div class="page-header">
                <h1>Финансовый расчет</h1>
            </div>
            <div class="card">
                <form>
                    <div class="form-grid">
                        <div><label class="form-label">Номер рейса</label><input type="text" class="form-control" placeholder="RT-1001"></div>
                        <div><label class="form-label">Водитель</label><input type="text" class="form-control" placeholder="ФИО"></div>
                        <div><label class="form-label">Ставка за км (₽)</label><input type="number" class="form-control" placeholder="15"></div>
                        <div><label class="form-label">Расстояние (км)</label><input type="number" class="form-control" placeholder="820"></div>
                        <div><label class="form-label">Топливо (₽)</label><input type="number" class="form-control" placeholder="12000"></div>
                        <div><label class="form-label">Доп. расходы (₽)</label><input type="number" class="form-control" placeholder="3000"></div>
                        <div><label class="form-label">Премия (₽)</label><input type="number" class="form-control" placeholder="5000"></div>
                        <div><label class="form-label">Итого к оплате (₽)</label><input type="text" class="form-control" readonly placeholder="Авто-расчет"></div>
                    </div>
                    <button type="submit" class="btn btn-primary">Рассчитать стоимость</button>
                </form>
            </div>
        </section>

    </main>

    <script>

        function showSection(id, element) {
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById(id).classList.add('active');
        }

        // Смена темы
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light');
            themeBtn.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
        });
        //ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ТЕМЫ//
        const toggleBtn = document.getElementById('themeToggle');

        // Проверяем, что было сохранено ранее
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            toggleBtn.textContent = '☀️';
        }

        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');

            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            toggleBtn.textContent = isDark ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
